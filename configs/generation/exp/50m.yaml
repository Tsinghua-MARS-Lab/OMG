# @package _global_
defaults:
  - override /model: motion_generator
  - override /denoiser: transformer_50m
  - override /diffusion: guided_x0
  - override /loss: diffusion_only

exp_name: g1_transformer_guided_50m_mixed_modal_all_original_rot6d_diffusion_only_4gpu_materialized
output_dir: ${paths.output_root}/${exp_name}

model:
  diffusion_target: future
  use_audio: true
  use_human_motion: true
  log_loss_term_grad_norms: false
  optimizer:
    lr: 6.0e-5
    weight_decay: 0.01
  scheduler:
    type: linear_warmup_cosine
    warmup_steps: 2000
    warmup_start_factor: 1.0e-4
    t_max: 100000
    eta_min: 1.0e-6

denoiser:
  frame_cond_injection: per_layer_film

trainer:
  max_steps: 100000
  val_check_interval: 2000
  accumulate_grad_batches: 1
  use_distributed_sampler: false
  limit_val_batches: 200

callbacks:
  checkpoint:
    every_n_train_steps: 2000

data:
  loader_opts:
    train:
      batch_size: 192
      num_workers: 0
      prefetch_factor: null
