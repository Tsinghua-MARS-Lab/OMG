# @package _global_
defaults:
  - override /model: motion_generator
  - override /denoiser: transformer_100m
  - override /diffusion: guided_x0
  - override /loss: full

exp_name: 100m
model:
  diffusion_target: future
  optimizer:
    lr: 1.0e-4
    weight_decay: 0.01
  scheduler:
    type: linear_warmup_cosine
    warmup_steps: 2000
    warmup_start_factor: 1.0e-4
    t_max: 180000
    eta_min: 1.0e-6
trainer:
  max_steps: 180000
  val_check_interval: 2000
  accumulate_grad_batches: 1
  limit_val_batches: 200
callbacks:
  checkpoint:
    every_n_train_steps: 2000
  divergence_guard:
    # The full objective contains weighted physical terms whose natural scale is
    # configuration-dependent. Monitor the normalized diffusion objective while
    # the independent gradient-norm guard covers unstable auxiliary gradients.
    loss_monitor: diffusion_loss
data:
  loader_opts:
    train:
      batch_size: 192
